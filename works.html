<!-- Arakaki Kensho ekotoba site v2.x - works page -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>作品一覧 ｜ えことば ― あらかき けんしょう</title>
  <meta name="description" content="あらかき けんしょうの「えことば」作品一覧。短い手書きの言葉と色とりどりの花の絵を、ゆっくりご覧いただけます。" />
  <meta property="og:title" content="作品一覧 ｜ えことば" />
  <meta property="og:description" content="やさしい言葉と花の絵の作品一覧。" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="images/ekotoba-04.jpg" />
  <meta name="theme-color" content="#F6EEDE" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500&family=Zen+Kurenaido&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header class="site-header scrolled" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="hanko" aria-hidden="true"></span>
        <span class="brand-name"><span class="brand-main">えことば</span><span class="sep">｜</span><span class="brand-sub">あらかき けんしょう</span></span>
      </a>
      <nav class="site-nav" aria-label="メインナビ">
        <a href="index.html#gallery">えことば</a>
        <a href="index.html#paintings">絵</a>
        <a href="index.html#poems">詩</a>
        <a href="index.html#story">想い</a>
        <a href="index.html#books">本</a>
        <a href="index.html#news">お知らせ</a>
        <a href="index.html#contact">お問い合わせ</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="メニューを開く" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-menu" id="mobileMenu" aria-label="モバイルメニュー" hidden>
      <a href="index.html#gallery">えことば</a>
      <a href="index.html#paintings">絵</a>
      <a href="index.html#poems">詩</a>
      <a href="index.html#story">想い</a>
      <a href="index.html#books">本</a>
      <a href="index.html#news">お知らせ</a>
      <a href="index.html#contact">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <!-- ===== 作品一覧 ===== -->
    <section class="section works-page" id="gallery" data-decor="tl:02,tr:16,bl:05,br:15,l1:33,l2:25,l3:42,r1:27,r2:21,r3:37">
      <div class="works-top">
        <a href="index.html" class="works-back">← ホームに戻る</a>
      </div>
      <div class="eyebrow reveal">
        <img class="section-banner" src="images/banners/banner-ekotoba.png" alt="えことば" loading="lazy" />
      </div>
      <h1 class="section-title reveal">えことば　作品一覧</h1>
      <p class="section-lead reveal">短い言葉と花の絵。ゆっくりご覧ください。<br />気になる作品はタップで大きく表示できます。</p>

      <div class="gallery-grid" id="galleryGrid"><!-- 全作品を script.js から生成 --></div>

      <div class="gallery-more reveal">
        <a href="index.html" class="btn btn-ghost">← ホームに戻る</a>
        <p class="gallery-note">Instagramでは、毎日えことばを投稿しています。<br />
          <a href="https://www.instagram.com/kotobaichi/" target="_blank" rel="noopener" class="inline-link">@kotobaichi でもっと見る →</a></p>
      </div>
    </section>
  </main>

  <!-- ===== フッター ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="hanko" aria-hidden="true"></span>
        <p class="footer-name">えことば</p>
      </div>
      <p class="footer-place">あらかき けんしょう ／ 沖縄</p>
      <nav class="footer-nav" aria-label="フッターナビ">
        <a href="index.html#gallery">えことば</a>
        <a href="index.html#paintings">絵</a>
        <a href="index.html#poems">詩</a>
        <a href="index.html#story">想い</a>
        <a href="index.html#books">本</a>
        <a href="index.html#news">お知らせ</a>
        <a href="index.html#contact">お問い合わせ</a>
      </nav>
      <div class="footer-sns">
        <a href="https://www.instagram.com/kotobaichi/" target="_blank" rel="noopener">Instagram @kotobaichi</a>
      </div>
      <p class="copyright">© <span id="year"></span> あらかき けんしょう</p>
    </div>
  </footer>

  <!-- ===== ライトボックス ===== -->
  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="作品の拡大表示">
    <button class="lightbox-close" id="lightboxClose" aria-label="閉じる">×</button>
    <figure class="lightbox-figure">
      <img src="" alt="" id="lightboxImg" />
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
  </div>

  <script src="script.js"></script>
</body>
</html>
