<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <symbol id="fl" viewBox="-26 -26 52 52">
      <g>
        <ellipse cx="0" cy="-15" rx="8" ry="13"/>
        <ellipse cx="0" cy="-15" rx="8" ry="13" transform="rotate(72)"/>
        <ellipse cx="0" cy="-15" rx="8" ry="13" transform="rotate(144)"/>
        <ellipse cx="0" cy="-15" rx="8" ry="13" transform="rotate(216)"/>
        <ellipse cx="0" cy="-15" rx="8" ry="13" transform="rotate(288)"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#F3B23E"/>
    </symbol>
    <symbol id="daisy" viewBox="-26 -26 52 52">
      <g>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(45)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(90)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(135)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(180)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(225)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(270)"/>
        <ellipse cx="0" cy="-16" rx="4.5" ry="12" transform="rotate(315)"/>
      </g>
      <circle cx="0" cy="0" r="6" fill="#F3B23E"/>
    </symbol>
    <symbol id="leaf" viewBox="-8 -22 16 44">
      <path d="M0 -20 C9 -12 9 12 0 20 C-9 12 -9 -12 0 -20 Z"/>
      <path d="M0 -16 L0 16" stroke="#8CA86B" stroke-width="1.4" fill="none" opacity="0.6"/>
    </symbol>
  </defs>

  <!-- stems / leaves -->
  <use href="#leaf" x="120" y="150" width="30" height="82" fill="#A9C486" transform="rotate(24 135 191)"/>
  <use href="#leaf" x="70" y="120" width="26" height="70" fill="#BBD199" transform="rotate(-18 83 155)"/>
  <use href="#leaf" x="175" y="170" width="24" height="66" fill="#9DBE78" transform="rotate(40 187 203)"/>

  <!-- flowers -->
  <use href="#fl" x="150" y="30" width="86" height="86" fill="#F2A7B6"/>
  <use href="#fl" x="90" y="70" width="70" height="70" fill="#F5CF6B"/>
  <use href="#daisy" x="185" y="95" width="64" height="64" fill="#FBF7EF"/>
  <use href="#fl" x="60" y="140" width="60" height="60" fill="#C9AEDD"/>
  <use href="#daisy" x="150" y="120" width="72" height="72" fill="#FBF7EF"/>
  <use href="#fl" x="200" y="150" width="56" height="56" fill="#EF8F7E"/>
  <use href="#fl" x="110" y="180" width="50" height="50" fill="#A9C6E0"/>

  <!-- filler dots -->
  <circle cx="66" cy="110" r="3.4" fill="#F2A7B6"/>
  <circle cx="240" cy="80" r="3.2" fill="#F5CF6B"/>
  <circle cx="252" cy="150" r="3" fill="#C9AEDD"/>
  <circle cx="96" cy="215" r="3" fill="#F3B23E"/>
  <circle cx="176" cy="215" r="2.8" fill="#EF8F7E"/>
</svg>
